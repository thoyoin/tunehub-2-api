name: CI
on:
    pull_request:
        branches:
            - develop
            - master
            - fix/reviewFixes
    push:
        branches:
            - develop
            - master

jobs:
    backend-checks:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: tunehub_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
        env:
            APP_ENV: test
            APP_SECRET: test
            KERNEL_CLASS: App\Kernel
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/tunehub_test?serverVersion=8.0
            DEFAULT_URI: http://localhost

        steps:
            -   uses: actions/checkout@v4
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Create .env file
                run: |
                    cat > .env <<'EOF'
                    APP_ENV=test
                    APP_SECRET=test
                    DATABASE_URL=mysql://root:root@127.0.0.1:3306/tunehub_test?serverVersion=8.0
                    DEFAULT_URI=http://localhost
                    EOF

            -   run: composer install --no-interaction --prefer-dist
            -   run: php bin/console doctrine:database:create --if-not-exists --env=test
            -   run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
            -   run: php bin/console lint:container
            -   run: php bin/console doctrine:schema:validate --env=test
            -   run: php bin/console debug:router
            -   run: APP_ENV=dev APP_DEBUG=1 php bin/console cache:warmup
            -   run: vendor/bin/phpstan analyse
            -   run: php bin/phpunit
