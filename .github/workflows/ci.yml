name: CI
on:
    pull_request:
        branches:
            - develop
            - master
            - fix/reviewFixes
    push:
        branches:
            - develop
            - master

jobs:
    backend-checks:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: tunehub_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
        env:
            APP_ENV: test
            APP_SECRET: test
            KERNEL_CLASS: App\Kernel
            DATABASE_URL: mysql://root:root@127.0.0.1:3306/tunehub_test?serverVersion=8.0
            DEFAULT_URI: http://localhost

        steps:
            -   uses: actions/checkout@v4
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'

            -   name: Create .env file
                run: |
                    cat > .env <<'EOF'
                    APP_ENV=test
                    APP_SECRET=test
                    DATABASE_URL=mysql://root:root@127.0.0.1:3306/tunehub_test?serverVersion=8.0
                    DEFAULT_URI=http://localhost
                    CORS_ALLOW_ORIGIN='^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
                    DEFAULT_COVER=http://localhost:9443/tunehub/defaults/default_cover.jpg
                    DEFAULT_PROFILE_PICTURE=https://localhost:9443/tunehub/defaults/profile_cover.jpg
                    JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
                    JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
                    REFRESH_TOKEN_SECRET=this_is_a_long_test_refresh_token_secret_32_chars_minimum
                    JWT_PASSPHRASE=test
                    MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
                    MESSENGER_TRANSPORT_DSN_FAILED=doctrine://default?queue_name=failed
                    EOF

            -   name: Generate JWT keys for test environment
                run: |
                    mkdir -p config/jwt
                    openssl genrsa -out config/jwt/private.pem -aes256 -passout pass:test 4096
                    openssl rsa -pubout -in config/jwt/private.pem -out config/jwt/public.pem -passin pass:test

            -   run: composer install --no-interaction --prefer-dist
            -   run: php bin/console doctrine:database:create --if-not-exists --env=test
            -   run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
            -   run: php bin/console lint:container
            -   run: php bin/console doctrine:schema:validate --env=test
            -   run: php bin/console debug:router
            -   run: APP_ENV=dev APP_DEBUG=1 php bin/console cache:warmup
            -   run: vendor/bin/phpstan analyse
            -   run: php bin/phpunit
