parameters:
    media.default_profile_picture: '%env(DEFAULT_PROFILE_PICTURE)%'
    media.default_cover: '%env(DEFAULT_COVER)%'
    app.refresh_token_secret: '%env(REFRESH_TOKEN_SECRET)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Infrastructure\Service\RefreshTokenService:
        arguments:
            $refreshSecret: '%app.refresh_token_secret%'

    League\Flysystem\FilesystemOperator $storage:
        alias: 'flysystem.default.storage'

    Aws\S3\S3Client:
        arguments:
            - version: 'latest'
              region: '%env(AWS_DEFAULT_REGION)%'
              endpoint: '%env(AWS_ENDPOINT)%'
              use_path_style_endpoint: true
              credentials:
                  key: '%env(AWS_ACCESS_KEY_ID)%'
                  secret: '%env(AWS_SECRET_ACCESS_KEY)%'

